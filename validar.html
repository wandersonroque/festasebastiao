<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Validador de Tickets - Arraiá</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e63946; --secondary: #f1faee; --dark: #1d3557; }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #reader { width: 100%; max-width: 500px; border: 2px solid var(--primary); border-radius: 15px; overflow: hidden; margin-top: 20px; }
        .result-card { display: none; width: 90%; max-width: 400px; background: white; color: #333; border-radius: 20px; padding: 25px; margin-top: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-confirm { background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 1.2rem; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-retry { background: #e63946; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; }
        .loading { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }
    </style>
</head>
<body>

    <h2 style="margin-top: 20px; color: var(--primary);">VALIDADOR DE TICKETS</h2>
    
    <div id="reader"></div>

    <div id="result-card" class="result-card">
        <div id="loading" class="loading" style="display:none;"></div>
        <div id="content-area">
            <div id="status-tag" class="status-badge"></div>
            <h1 id="ticket-item" style="margin: 10px 0;">---</h1>
            <p id="ticket-info" style="color: #666;"></p>
            <div id="action-buttons"></div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES DO SUPABASE (Substitua se necessário)
        const SB_URL = "SUA_URL_AQUI";
        const SB_KEY = "SUA_KEY_AQUI";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const html5QrCode = new html5QrCode("reader");
        const card = document.getElementById('result-card');

        function onScanSuccess(decodedText) {
            html5QrCode.pause();
            processTicket(decodedText);
        }

        async function processTicket(data) {
            const parts = data.split('_');
            if (parts[0] !== 'VALIDAR') {
                showError("QR CODE INVÁLIDO");
                return;
            }

            const id = parts[1];
            const token = parts[2];

            card.style.display = 'block';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content-area').style.display = 'none';

            try {
                const { data: venda, error } = await _supabase
                    .from('vendas')
                    .select('*')
                    .eq('id', id)
                    .eq('token', token)
                    .single();

                if (error || !venda) throw new Error("TICKET NÃO ENCONTRADO");

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content-area').style.display = 'block';
                
                const statusTag = document.getElementById('status-tag');
                const itemH1 = document.getElementById('ticket-item');
                const infoP = document.getElementById('ticket-info');
                const buttons = document.getElementById('action-buttons');

                itemH1.innerText = venda.itens;
                infoP.innerText = `Ticket #${venda.token} | Valor: R$ ${venda.valor}`;

                if (venda.status === 'PAGO') {
                    statusTag.innerText = "PRONTO PARA ENTREGA";
                    statusTag.style.background = "#d4edda";
                    statusTag.style.color = "#155724";
                    buttons.innerHTML = `<button class="btn-confirm" onclick="confirmarEntrega(${id})">CONFIRMAR ENTREGA</button>`;
                } else if (venda.status === 'ENTREGUE') {
                    statusTag.innerText = "JÁ FOI ENTREGUE";
                    statusTag.style.background = "#fff3cd";
                    statusTag.style.color = "#856404";
                    buttons.innerHTML = `<button class="btn-retry" onclick="resetScanner()">VOLTAR AO SCANNER</button>`;
                } else {
                    statusTag.innerText = "AGUARDANDO PAGAMENTO";
                    statusTag.style.background = "#f8d7da";
                    statusTag.style.color = "#721c24";
                    buttons.innerHTML = `<button class="btn-retry" onclick="resetScanner()">TENTAR NOVAMENTE</button>`;
                }

            } catch (err) {
                showError(err.message);
            }
        }

        async function confirmarEntrega(id) {
            const { error } = await _supabase
                .from('vendas')
                .update({ status: 'ENTREGUE' })
                .eq('id', id);

            if (!error) {
                alert("✅ ENTREGA CONFIRMADA COM SUCESSO!");
                resetScanner();
            }
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content-area').style.display = 'block';
            document.getElementById('status-tag').innerText = "ERRO";
            document.getElementById('status-tag').style.background = "#e63946";
            document.getElementById('ticket-item').innerText = msg;
            document.getElementById('action-buttons').innerHTML = `<button class="btn-retry" onclick="resetScanner()">TENTAR NOVAMENTE</button>`;
        }

        function resetScanner() {
            card.style.display = 'none';
            html5QrCode.resume();
        }

        Html5Qrcode.getCameras().then(devices => {
  if (devices && devices.length) {
    // Escolhe a última câmera da lista (geralmente a traseira principal)
    const cameraId = devices[devices.length - 1].id; 
    html5QrCode.start(
      cameraId, 
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess
    ).catch(err => alert("Erro ao iniciar câmera: " + err));
  } else {
    alert("Nenhuma câmera encontrada.");
  }
}).catch(err => alert("Erro ao buscar câmeras: " + err));
    </script>
</body>
</html>
