<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Validador de Tickets - Arraiá</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e63946; --secondary: #f1faee; --dark: #1d3557; }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #reader { width: 100%; max-width: 500px; border: 2px solid var(--primary); border-radius: 15px; overflow: hidden; margin-top: 20px; }
        .result-card { display: none; width: 90%; max-width: 400px; background: white; color: #333; border-radius: 20px; padding: 25px; margin-top: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-confirm { background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 1.2rem; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-retry { background: #e63946; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; }
        .loading { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }
    </style>
</head>
<body>

    <h2 style="margin-top: 20px; color: var(--primary);">VALIDADOR DE TICKETS</h2>
    
    <div id="reader"></div>

    <div id="result-card" class="result-card">
        <div id="loading" class="loading" style="display:none;"></div>
        <div id="content-area">
            <div id="status-tag" class="status-badge"></div>
            <h1 id="ticket-item" style="margin: 10px 0;">---</h1>
            <p id="ticket-info" style="color: #666;"></p>
            <div id="action-buttons"></div>
        </div>
    </div>

    <script>
        // Substitua tudo entre as tags <script> por este bloco:
const SB_URL = "SUA_URL_AQUI";
const SB_KEY = "SUA_KEY_AQUI";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

const html5QrCode = new Html5Qrcode("reader");
const card = document.getElementById('result-card');

// Função para iniciar a câmera com permissão explícita
async function startScanner() {
    try {
        const devices = await Html5Qrcode.getCameras();
        if (devices && devices.length > 0) {
            // Tenta achar a câmera traseira, se não, pega a primeira disponível
            const backCamera = devices.find(device => device.label.toLowerCase().includes('back')) || devices[0];
            
            await html5QrCode.start(
                backCamera.id,
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess
            );
        } else {
            alert("Nenhuma câmera encontrada. Verifique as permissões do Safari.");
        }
    } catch (err) {
        console.error("Erro ao iniciar:", err);
        alert("Clique no 'AA' ou no cadeado lá em cima e permita o acesso à câmera.");
    }
}

function onScanSuccess(decodedText) {
    html5QrCode.pause();
    processTicket(decodedText);
}

// RESTANTE DAS FUNÇÕES (processTicket, confirmarEntrega, etc...) 
// MANTENHA AS QUE VOCÊ JÁ TEM ABAIXO DESTA LINHA

// Inicia automaticamente
startScanner();
    </script>
</body>
</html>
