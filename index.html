<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARRAIÁ SÃO SEBASTIÃO - PREMIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #ea1d2c;
            --primary-hover: #c91824;
            --bg-light: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1f1f1f;
            --text-sub: #6e6e6e;
            --success: #27ae60;
            --shadow-soft: 0 8px 30px rgba(0,0,0,0.06);
            --radius: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; color: var(--text-main);
            line-height: 1.4;
        }

        #welcome-screen {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, var(--primary) 0%, #911018 100%);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; text-align: center; color: white;
            transition: all 0.7s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .welcome-icon { font-size: 5rem; margin-bottom: 10px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .btn-start {
            background: white; color: var(--primary); border: none;
            padding: 20px 50px; border-radius: 50px; font-weight: 800;
            font-size: 1.1rem; cursor: pointer; box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            margin-top: 30px; transition: 0.3s;
        }

        header { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
            padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05);
            text-align: center;
        }
        header h1 { font-size: 1.4rem; margin: 0; font-weight: 800; color: var(--primary); }
        header p { margin: 4px 0 0; color: var(--text-sub); font-size: 0.85rem; font-weight: 600; }

        .nav-scroller {
            background: var(--card-bg); padding: 12px 15px;
            display: flex; gap: 10px; overflow-x: auto;
            scrollbar-width: none; border-bottom: 1px solid #eee;
        }
        .nav-chip {
            background: #f0f0f0; border: none; padding: 10px 24px;
            border-radius: 100px; font-weight: 700; color: var(--text-sub);
            cursor: pointer; transition: 0.3s; white-space: nowrap; font-size: 0.85rem;
        }
        .nav-chip.active { 
            background: var(--primary); color: white; 
            box-shadow: 0 8px 20px rgba(234, 29, 44, 0.25); 
        }

        .main-content { padding: 15px; max-width: 600px; margin: 0 auto 120px; }
        .product-card {
            background: var(--card-bg); border-radius: var(--radius);
            display: flex; align-items: center; padding: 18px;
            margin-bottom: 15px; box-shadow: var(--shadow-soft);
            border: 1px solid rgba(0,0,0,0.02); transition: 0.2s;
        }
        
        .product-info { flex: 1; }
        .product-info h3 { margin: 0; font-size: 1rem; font-weight: 700; color: var(--text-main); }
        .product-info p { margin: 4px 0; font-size: 0.8rem; color: var(--text-sub); font-weight: 400; }
        .price-tag { color: var(--success); font-weight: 800; font-size: 1.1rem; margin-top: 5px; display: block; }

        .btn-add-circle {
            background: #fff; border: 1.5px solid #eee; color: var(--primary);
            width: 45px; height: 45px; border-radius: 50%;
            font-size: 1.5rem; font-weight: 400; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        #cart-bar {
            position: fixed; bottom: 25px; left: 15px; right: 15px;
            background: var(--primary); color: white; padding: 15px 25px;
            border-radius: 20px; display: none; justify-content: space-between;
            align-items: center; font-weight: 800; z-index: 2000;
            box-shadow: 0 12px 40px rgba(234, 29, 44, 0.4); cursor: pointer;
        }

        /* BOTÃO FLUTUANTE AMARELO */
        #tickets-float {
            position: fixed; bottom: 95px; right: 15px;
            background: #f1c40f; color: #000; padding: 12px 20px;
            border-radius: 50px; font-weight: 800; display: none;
            z-index: 2000; box-shadow: var(--shadow-soft); cursor: pointer;
            border: 2px solid #fff; animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(100px); } to { transform: translateX(0); } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 4000; display: none; backdrop-filter: blur(4px); }
        #checkout-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%;
            background: white; z-index: 5000; border-radius: 30px 30px 0 0;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.15); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #checkout-modal.open { bottom: 0; }

        .checkout-header { padding: 25px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .checkout-body { flex: 1; overflow-y: auto; padding: 20px; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f8f8f8; }
        
        .btn-finish {
            background: var(--success); color: white; border: none; width: 100%;
            padding: 22px; border-radius: 20px; font-weight: 800; font-size: 1.1rem;
            cursor: pointer; margin-top: 15px;
        }

        .ticket-card {
            background: #fffcf0; border: 2px dashed #f1c40f; border-radius: 20px;
            padding: 20px; margin: 10px auto; width: 280px; display: inline-block;
            vertical-align: top; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            white-space: normal;
        }

        .tickets-container { overflow-x: auto; white-space: nowrap; padding: 10px; scrollbar-width: none; }

        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-icon">🎉</div>
        <h1 style="font-weight: 800; margin: 0;">ARRAIÁ SÃO SEBASTIÃO</h1>
        <p style="opacity: 0.9; margin-top: 10px;">O melhor sabor da roça no Gama!</p>
        <button class="btn-start" onclick="closeWelcome()">ABRIR CARDÁPIO</button>
    </div>

    <header>
        <h1>Arraiá São Sebastião</h1>
        <p>📍 Praça Central • Gama - DF</p>
    </header>

    <div class="nav-scroller">
        <button class="nav-chip active" onclick="changeCategory(event, 'comidas')">🍴 Comidas</button>
        <button class="nav-chip" onclick="changeCategory(event, 'bebidas')">🥤 Bebidas</button>
        <button class="nav-chip" onclick="changeCategory(event, 'jogos')">🎯 Jogos</button>
    </div>

    <div class="main-content">
        <div id="product-list"></div>
    </div>

    <!-- BOTÃO MEUS TICKETS -->
    <div id="tickets-float" onclick="recuperarMeusPedidos()">
        🎫 MEUS TICKETS
    </div>

    <div id="cart-bar" onclick="openCheckout()">
        <div style="display: flex; align-items: center; gap: 12px;">
            <span style="background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 10px;" id="count-badge">0</span>
            <span>VER MEU PEDIDO</span>
        </div>
        <span id="total-float">R$ 0,00</span>
    </div>

    <div class="modal-overlay" id="overlay" onclick="closeCheckout()"></div>
    <div id="checkout-modal">
        <div class="checkout-header">
            <h2 style="margin:0; font-size: 1.3rem; font-weight: 800;">Meu Pedido</h2>
            <button onclick="closeCheckout()" style="background:#f0f0f0; border:none; width:35px; height:35px; border-radius:50%; font-weight:800;">✕</button>
        </div>
        <div class="checkout-body" id="checkout-items"></div>
        <div id="footer-checkout" style="padding: 25px; border-top: 1px solid #f0f0f0;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 800; font-size: 1.3rem;">
                <span>Total</span>
                <span id="total-checkout" style="color:var(--success)">R$ 0,00</span>
            </div>
            <button class="btn-finish" onclick="processOrder()">FINALIZAR PEDIDO</button>
        </div>
    </div>

<script>
const SUPABASE_URL = "https://ttmwwvqowcuxmtdwlyms.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0bXd3dnFvd2N1eG10ZHdseW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTc5NjcsImV4cCI6MjA5Mjk3Mzk2N30.G88ljgeVsjapjmT2KhboaQiAPtwxhde35Cgxis7sc4w";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let cart = [];
let totalValue = 0;
let productsData = [];
let checkStatusInterval = null;

async function init() {
    const { data, error } = await _supabase.from('produtos').select('*').order('nome');
    if (error) return console.error(error);
    productsData = data;
    renderProducts('comidas');
    verificarCompraExistente();
}

function renderProducts(cat) {
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    const filtered = productsData.filter(p => p.categoria.toLowerCase() === cat.toLowerCase());
    
    filtered.forEach(p => {
        list.innerHTML += `
            <div class="product-card">
                <div class="product-info">
                    <h3>${p.nome}</h3>
                    <p>Qualidade Garantida</p>
                    <span class="price-tag">R$ ${p.preco.toFixed(2).replace('.', ',')}</span>
                </div>
                <button class="btn-add-circle" onclick="addToCart('${p.nome}', ${p.preco}, '${p.categoria}')">+</button>
            </div>
        `;
    });
}

function closeWelcome() { document.getElementById('welcome-screen').style.transform = 'translateY(-100%)'; }

function changeCategory(e, cat) {
    document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
    if(e) e.target.classList.add('active');
    renderProducts(cat);
}

function addToCart(nome, preco, categoria) {
    cart.push({ nome, preco, categoria });
    totalValue += preco;
    updateUI();
}

function updateUI() {
    const v = "R$ " + totalValue.toFixed(2).replace('.', ',');
    document.getElementById('count-badge').innerText = cart.length;
    document.getElementById('total-float').innerText = v;
    document.getElementById('total-checkout').innerText = v;
    document.getElementById('cart-bar').style.display = cart.length > 0 ? 'flex' : 'none';
}

function openCheckout() {
    const list = document.getElementById('checkout-items');
    list.innerHTML = cart.length ? '' : '<p style="text-align:center; color:#999;">Nada por aqui ainda...</p>';
    document.getElementById('footer-checkout').style.display = cart.length ? 'block' : 'none';
    
    cart.forEach((item, idx) => {
        list.innerHTML += `
            <div class="item-row">
                <div>
                    <div style="font-weight:700;">${item.nome}</div>
                    <div style="color:var(--success); font-size:0.9rem; font-weight:800;">R$ ${item.preco.toFixed(2).replace('.', ',')}</div>
                </div>
                <button onclick="removeItem(${idx})" style="background:none; border:none; color:var(--primary); font-weight:700;">Remover</button>
            </div>
        `;
    });
    document.getElementById('checkout-modal').classList.add('open');
    document.getElementById('overlay').style.display = 'block';
}

function closeCheckout() {
    document.getElementById('checkout-modal').classList.remove('open');
    document.getElementById('overlay').style.display = 'none';
    if(checkStatusInterval) clearInterval(checkStatusInterval);
}

function removeItem(idx) {
    totalValue -= cart[idx].preco;
    cart.splice(idx, 1);
    if (cart.length === 0) {
        closeCheckout();
    } else {
        updateUI();
        openCheckout();
    }
}

async function processOrder() {
    if (!cart.length) return;
    const btn = document.querySelector('.btn-finish');
    btn.disabled = true;
    btn.innerText = "GERANDO PIX ÚNICO...";

    const compraID = "COMPRA_" + Math.random().toString(36).substr(2, 9).toUpperCase();

    const itensParaInserir = cart.map(item => ({
        cliente: "APP_USER",
        itens: item.nome,
        valor: item.preco,
        status: 'PENDENTE',
        token: Math.floor(1000 + Math.random() * 9000),
        categoria: item.categoria || 'geral',
        compra_id: compraID 
    }));

    try {
        const { data, error } = await _supabase.from('vendas').insert(itensParaInserir).select();
        if (error) throw error;

        // SALVA NA MEMÓRIA DO CELULAR
        localStorage.setItem('arraiá_ultima_compra', compraID);
        document.getElementById('tickets-float').style.display = 'block';

        // LIMPA O CARRINHO ANTES DE MOSTRAR A TELA
        const totalPago = totalValue;
        cart = [];
        totalValue = 0;
        updateUI();

        mostrarTelaPagamento(totalPago);
        iniciarVigilancia(data[0].id, data); 

    } catch (e) {
        alert("Erro ao salvar: " + e.message);
        btn.disabled = false;
        btn.innerText = "FINALIZAR PEDIDO";
    }
}

function mostrarTelaPagamento(valor) {
    document.getElementById('footer-checkout').style.display = 'none';
    document.getElementById('checkout-items').innerHTML = `
        <div style="text-align:center; padding: 40px 0;">
            <div class="spinner"></div>
            <h2 style="color:var(--primary); font-weight:800;">AGUARDANDO PAGAMENTO</h2>
            <div style="background:#f8f9fa; padding:20px; border-radius:15px; margin:20px 0; border: 2px dashed #ddd;">
                <p style="font-size:0.8rem; color:#666; margin:0;">VALOR TOTAL DO PIX</p>
                <h1 style="margin:5px 0; color:var(--success);">R$ ${valor.toFixed(2).replace('.', ',')}</h1>
            </div>
            <p style="font-size:0.85rem; color:var(--text-sub);">O sistema liberará seus tickets automaticamente após a confirmação.</p>
        </div>
    `;
}

function iniciarVigilancia(idReferencia, todosOsDados) {
    if(checkStatusInterval) clearInterval(checkStatusInterval);
    checkStatusInterval = setInterval(async () => {
        const { data } = await _supabase.from('vendas').select('status').eq('id', idReferencia).single();
        if (data && data.status === 'PAGO') {
            clearInterval(checkStatusInterval);
            mostrarTicketsSucesso(todosOsDados);
        }
    }, 3000);
}

function mostrarTicketsSucesso(itensVendidos) {
    let ticketsHTML = `<div class="tickets-container">`;
    itensVendidos.forEach((item, index) => {
        ticketsHTML += `
            <div class="ticket-card">
                <div style="font-weight:800; color:var(--primary); font-size:1.2rem; margin-bottom:5px;">${item.itens}</div>
                <div style="font-size:0.7rem; color:var(--text-sub); margin-bottom:15px;">BARRACA: ${item.categoria.toUpperCase()}</div>
                <div id="qrcode-${index}" style="background:white; padding:10px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:center;"></div>
                <div style="font-size:2rem; font-weight:900; color:var(--text-main);">#${item.token}</div>
                <div style="font-size:0.6rem; color:var(--success); font-weight:bold; margin-top:5px;">✓ PAGO - APRESENTE NA BARRACA</div>
            </div>
        `;
    });
    ticketsHTML += `</div>`;

    document.getElementById('checkout-items').innerHTML = `
        <div style="text-align:center; padding: 20px 0;">
            <div style="font-size:3rem;">🙏</div>
            <h2 style="color:var(--success); font-weight:800; margin-bottom:5px;">PAGAMENTO CONFIRMADO!</h2>
            <p style="font-size:0.8rem; color:#666;">Aqui estão seus tickets. Deslize para o lado:</p>
            ${ticketsHTML}
            <button onclick="limparEComprarDeNovo()" style="background:#f0f0f0; border:none; width:80%; padding:15px; border-radius:12px; font-weight:bold; margin-top:20px;">FAZER NOVA COMPRA</button>
        </div>
    `;

    itensVendidos.forEach((item, index) => {
        new QRCode(document.getElementById(`qrcode-${index}`), {
            text: `VALIDAR_${item.id}_${item.token}`,
            width: 130, height: 130
        });
    });
}

function verificarCompraExistente() {
    const salvo = localStorage.getItem('arraiá_ultima_compra');
    if (salvo) {
        document.getElementById('tickets-float').style.display = 'block';
    }
}

async function recuperarMeusPedidos() {
    const salvo = localStorage.getItem('arraiá_ultima_compra');
    if (!salvo) return;

    openCheckout();
    document.getElementById('checkout-items').innerHTML = '<div class="spinner" style="margin-top:50px"></div><p style="text-align:center">Buscando seus tickets...</p>';
    document.getElementById('footer-checkout').style.display = 'none';

    const { data, error } = await _supabase.from('vendas').select('*').eq('compra_id', salvo);
    
    if (data && data.length > 0) {
        const jaPago = data.some(item => item.status === 'PAGO');
        if (jaPago) {
            mostrarTicketsSucesso(data);
        } else {
            const valorTotal = data.reduce((acc, item) => acc + item.valor, 0);
            mostrarTelaPagamento(valorTotal);
            iniciarVigilancia(data[0].id, data);
        }
    } else {
        localStorage.removeItem('arraiá_ultima_compra');
        document.getElementById('tickets-float').style.display = 'none';
        closeCheckout();
    }
}

function limparEComprarDeNovo() {
    closeCheckout(); 
    localStorage.removeItem('arraiá_ultima_compra');
    document.getElementById('tickets-float').style.display = 'none';
    cart = [];
    totalValue = 0;
    updateUI();
    location.reload();
}

init();
</script>
</body>
</html>
